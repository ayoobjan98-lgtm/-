<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلود فایل - سایت اشتراک فایل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', 'Tahoma', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 50px 0;
            color: white;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .upload-area {
            border: 3px dashed #764ba2;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .upload-area:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .upload-icon {
            font-size: 48px;
            color: #764ba2;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #495057;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #6c757d;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .files-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-title {
            color: #495057;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .files-list {
            display: grid;
            gap: 15px;
        }

        .file-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid #e9ecef;
        }

        .file-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: white;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            color: #495057;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .file-meta {
            color: #6c757d;
            font-size: 0.85em;
            display: flex;
            gap: 20px;
        }

        .file-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
           /* text-decoration: none;
            display: inline-block;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: #e9ecef;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            padding: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .upload-section {
                padding: 20px;
            }
            
            .file-item {
                flex-direction: column;
                text-align: center;
            }
            
            .file-meta {
                justify-content: center;
                margin-bottom: 15px;
            }
            
            .download-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📥 دانلود فایل</h1>
            <p class="subtitle">سامانه اشتراک‌گذاری و دانلود فایل</p>
        </header>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">فایل خود را بکشید و اینجا رها کنید</div>
                <div class="upload-hint">یا برای انتخاب فایل کلیک کنید</div>
                <input type="file" id="fileInput" multiple>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="files-section">
            <h2 class="section-title">📋 فایل‌های قابل دانلود</h2>
            <div class="files-list" id="filesList">
                <!-- فایل‌ها به صورت خودکار اینجا نمایش داده می‌شوند -->
            </div>
        </div>

        <footer>
            <p>🚀 ساده و سریع - تمام فایل‌ها در مرورگر شما ذخیره می‌شوند</p>
        </footer>
    </div>

    <script>
        // آرایه برای ذخیره فایل‌ها
        let files = [];

        // عناصر DOM
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const filesList = document.getElementById('filesList');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // رویدادهای آپلود
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e9ecef';
            uploadArea.style.borderColor = '#667eea';
        });

        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f8f9fa';
            uploadArea.style.borderColor = '#764ba2';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f8f9fa';
            uploadArea.style.borderColor = '#764ba2';
            
            const droppedFiles = e.dataTransfer.files;
            handleFiles(droppedFiles);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // پردازش فایل‌ها
        function handleFiles(newFiles) {
            progressBar.style.display = 'block';
            let progress = 0;
            
            Array.from(newFiles).forEach((file, index) => {
                // شبیه‌سازی پیشرفت آپلود
                const interval = setInterval(() => {
                    progress += 5;
                    progressFill.style.width = progress + '%';
                    
                    if (progress >= 100) {
                        clearInterval(interval);
                        setTimeout(() => {
                            progressBar.style.display = 'none';
                            progressFill.style.width = '0%';
                        }, 500);
                    }
                }, 30 * (index + 1));

                // اضافه کردن فایل به لیست
                const fileData = {
                    id: Date.now() + Math.random(),
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    lastModified: file.lastModified,
                    file: file
                };
                
                files.push(fileData);
                displayFiles();
            });
            
            // پاک کردن input
            fileInput.value = '';
        }

        // نمایش فایل‌ها
        function displayFiles() {
            if (files.length === 0) {
                filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <h3>هیچ فایلی وجود ندارد</h3>
                        <p>اولین فایل را آپلود کنید</p>
                    </div>
                `;
                return;
            }

            filesList.innerHTML = files.map(file => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">📄 ${file.name}</div>
                        <div class="file-meta">
                            <span>📦 ${formatFileSize(file.size)}</span>
                            <span>📅 ${new Date(file.lastModified).toLocaleDateString('fa-IR')}</span>
                            <span>🏷 ${file.type || 'نامشخص'}</span>
                        </div>
                    </div>
                    <button class="download-btn" onclick="downloadFile('${file.id}')">
                        ⬇️ دانلود
                    </button>
                </div>
            `).join('');
        }

        // دانلود فایل
        window.downloadFile = function(fileId) {
            const fileData = files.find(f => f.id == fileId);
            if (fileData) {
                const url = URL.createObjectURL(fileData.file);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileData.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        }

        // فرمت کردن حجم فایل
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'Png'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // ذخیره در localStorage
        function saveToLocalStorage() {
            // توجه: فایل‌ها رو نمی‌شه مستقیم توی localStorage ذخیره کرد
            // اینجا فقط اطلاعات متادیتا ذخیره می‌شه
            const filesMeta = files.map(f => ({
                id: f.id,
                name: f.name,
                size: f.size,
                type: f.type,
                lastModified: f.lastModified
            }));
            localStorage.setItem('uploadedFiles', JSON.stringify(filesMeta));
        }

        // نمایش اولیه
        displayFiles();
    </script>
</body>
</html>
